<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日报 · 日历</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #86868b;
    --accent: #0071e3;
    --accent-light: #e8f0fe;
    --border: #e5e5e7;
    --today-bg: #0071e3;
    --today-text: #ffffff;
    --dot-color: #0071e3;
    --hover-bg: #f0f0f2;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text: #f5f5f7;
      --text-secondary: #98989d;
      --accent: #4da6ff;
      --accent-light: #1a2a3a;
      --border: #3a3a3c;
      --today-bg: #4da6ff;
      --today-text: #1c1c1e;
      --dot-color: #4da6ff;
      --hover-bg: #3a3a3c;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1100px;
    min-height: 560px;
  }

  /* ---- Calendar Panel ---- */
  .calendar-panel {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 24px 24px;
    flex: 0 0 420px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .calendar-header h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .nav-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .nav-btn:hover { background: var(--hover-bg); }
  .nav-btn:active { transform: scale(0.95); }

  .today-btn-wrap {
    text-align: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .today-btn {
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent-light);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
  }

  .today-btn:hover {
    background: var(--accent);
    color: var(--today-text);
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 2px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .day-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    transition: all 0.12s;
    font-variant-numeric: tabular-nums;
    user-select: none;
    min-width: 0;
    min-height: 0;
    aspect-ratio: 1;
  }

  .day-cell:hover {
    background: var(--hover-bg);
  }

  .day-cell.empty,
  .day-cell.other-month { cursor: default; }
  .day-cell.empty:hover,
  .day-cell.other-month:hover { background: transparent; }

  .day-cell.today {
    background: var(--today-bg);
    color: var(--today-text);
    font-weight: 700;
  }

  .day-cell.today:hover { opacity: 0.9; }

  .day-cell.selected {
    box-shadow: inset 0 0 0 2px var(--accent);
  }

  .day-cell.today.selected {
    box-shadow: inset 0 0 0 2px var(--today-text);
  }

  .day-cell.has-report::after {
    content: "";
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--dot-color);
  }

  .day-cell.today.has-report::after {
    background: var(--today-text);
  }

  .day-cell.other-month {
    color: var(--text-secondary);
    opacity: 0.35;
  }

  /* ---- Report Panel ---- */
  .report-panel {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 28px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .report-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    text-align: center;
    gap: 12px;
  }

  .report-placeholder .icon {
    font-size: 48px;
    opacity: 0.5;
  }

  .report-placeholder p {
    font-size: 15px;
    line-height: 1.6;
  }

  .report-placeholder .hint {
    font-size: 13px;
    opacity: 0.6;
  }

  .report-content {
    flex: 1;
    overflow-y: auto;
    font-size: 15px;
    line-height: 1.8;
    padding-right: 4px;
  }

  .report-content::-webkit-scrollbar {
    width: 6px;
  }

  .report-content::-webkit-scrollbar-track {
    background: transparent;
  }

  .report-content::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .report-content h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--accent);
  }

  .report-content .section-title {
    font-size: 15px;
    font-weight: 700;
    margin: 16px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .report-content .item {
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .report-content .item .title {
    font-weight: 600;
  }

  .report-content .item .source {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .report-content .item .source a {
    color: var(--accent);
    text-decoration: none;
  }

  .report-content .item .source a:hover {
    text-decoration: underline;
  }

  .report-content .highlight {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--accent-light);
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    border-left: 3px solid var(--accent);
  }

  .report-content .highlight strong {
    color: var(--accent);
  }

  .report-date-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .report-date-header h3 {
    font-size: 18px;
    font-weight: 700;
  }

  .footer-info {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .footer-info .count {
    font-weight: 500;
    color: var(--accent);
  }

  /* ---- Responsive ---- */
  @media (max-width: 860px) {
    .container {
      flex-direction: column;
      max-width: 500px;
    }

    .calendar-panel {
      flex: 0 0 auto;
    }

    .report-panel {
      min-height: 300px;
    }
  }

  @media (max-width: 480px) {
    body { padding: 10px; }
    .calendar-panel { padding: 16px 12px 14px; flex: 0 0 auto; }
    .report-panel { padding: 16px 14px 14px; }
    .day-cell { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Calendar -->
  <div class="calendar-panel">
    <div class="calendar-header">
      <button class="nav-btn" id="prevMonth" title="上个月">&larr;</button>
      <h2 id="monthYear"></h2>
      <button class="nav-btn" id="nextMonth" title="下个月">&rarr;</button>
    </div>
    <div class="today-btn-wrap">
      <button class="today-btn" id="goToday">回到今天</button>
    </div>
    <div class="weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="days-grid" id="daysGrid"></div>
    <div class="footer-info">
      <span>AI 日报 · 日历归档</span>
      <span class="count" id="reportCount"></span>
    </div>
  </div>

  <!-- Report -->
  <div class="report-panel" id="reportPanel">
    <div class="report-placeholder" id="reportPlaceholder">
      <div class="icon">📰</div>
      <p>点击日历中带圆点的日期<br>查看当日 AI 日报</p>
      <p class="hint">蓝点 = 当日有 AI 日报</p>
    </div>
    <div class="report-content" id="reportContent" style="display:none;"></div>
  </div>
</div>

  // ── State ──
  const todayStr = new Date().toISOString().slice(0, 10);
  const todayDate = new Date(todayStr + 'T00:00:00');
  let currentMonth = todayDate.getMonth();
  let currentYear = todayDate.getFullYear();
  let selectedDate = todayStr;
  let reportsMap = {};

  // ── DOM ──
  const monthYearEl = document.getElementById('monthYear');
  const daysGrid = document.getElementById('daysGrid');
  const reportPlaceholder = document.getElementById('reportPlaceholder');
  const reportContent = document.getElementById('reportContent');
  const reportCount = document.getElementById('reportCount');

  // ── Init data from inline fallback ──
  function initFromInline() {
    reportsMap = {};
    for (const r of INITIAL_DATA.reports) {
      reportsMap[r.date] = r.content;
    }
    reportCount.textContent = Object.keys(reportsMap).length + ' 篇日报';
    render();
  }

  // ── Try fetch external data ──
  async function loadExternalData() {
    try {
      const resp = await fetch('data.json?' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      if (data && data.reports && data.reports.length > 0) {
        reportsMap = {};
        for (const r of data.reports) {
          reportsMap[r.date] = r.content;
        }
        reportCount.textContent = Object.keys(reportsMap).length + ' 篇日报';
        render();
      }
    } catch (e) {
      console.warn('外部数据加载失败，使用内联数据:', e);
      // 保持内联数据
    }
  }

  // ── Render calendar (exactly 42 cells = 6 rows × 7 cols) ──
  function render() {
    monthYearEl.textContent = currentYear + '年 ' + (currentMonth + 1) + '月';

    const firstDay = new Date(currentYear, currentMonth, 1);
    const startDayOfWeek = firstDay.getDay(); // 0=Sun
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

    let html = '';
    let cellCount = 0;
    const MAX_CELLS = 42;

    // Previous month leading days
    for (let i = 0; i < startDayOfWeek && cellCount < MAX_CELLS; i++) {
      const day = daysInPrevMonth - startDayOfWeek + 1 + i;
      html += `<div class="day-cell other-month">${day}</div>`;
      cellCount++;
    }

    // Current month days
    for (let d = 1; d <= daysInMonth && cellCount < MAX_CELLS; d++) {
      const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      let cls = 'day-cell';
      if (dateStr === todayStr) cls += ' today';
      if (dateStr === selectedDate) cls += ' selected';
      if (reportsMap[dateStr]) cls += ' has-report';
      html += `<div class="${cls}" data-date="${dateStr}">${d}</div>`;
      cellCount++;
    }

    // Next month trailing days
    let nextDay = 1;
    while (cellCount < MAX_CELLS) {
      html += `<div class="day-cell other-month">${nextDay}</div>`;
      nextDay++;
      cellCount++;
    }

    daysGrid.innerHTML = html;

    // Click handlers
    daysGrid.querySelectorAll('.day-cell:not(.other-month)').forEach(cell => {
      cell.addEventListener('click', () => {
        const dateStr = cell.dataset.date;
        selectedDate = dateStr;
        render();
        showReport(dateStr);
      });
    });

    // Show selected report
    if (reportsMap[selectedDate]) {
      showReport(selectedDate);
    }
  }

  // ── Show report ──
  function showReport(dateStr) {
    const content = reportsMap[dateStr];
    if (!content) {
      reportPlaceholder.style.display = 'flex';
      reportContent.style.display = 'none';
      return;
    }

    reportPlaceholder.style.display = 'none';
    reportContent.style.display = 'block';

    const lines = content.split('\n');
    let html = '';
    let inItems = false;
    let inHighlight = false;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;

      if (line.startsWith('📢')) {
        html += `<h3>${escapeHtml(line)}</h3>`;
        continue;
      }

      if (line.startsWith('【热点速览】')) {
        html += `<div class="section-title">${escapeHtml(line)}</div>`;
        inItems = true;
        inHighlight = false;
        continue;
      }

      if (line.startsWith('【今日重点】')) {
        html += `<div class="section-title">${escapeHtml(line)}</div>`;
        inItems = false;
        inHighlight = true;
        continue;
      }

      if (inItems && /^\d+\.📌/.test(line)) {
        html += `<div class="item"><div class="title">${escapeHtml(line)}</div>`;
        continue;
      }

      if (inItems && line.startsWith('来源：')) {
        const match = line.match(/来源：(.+?)\s*\|\s*(https?:\/\/\S+)/);
        if (match) {
          html += `<div class="source">来源：${escapeHtml(match[1])} | <a href="${match[2]}" target="_blank" rel="noopener">${match[2]}</a></div>`;
        } else {
          html += `<div class="source">${escapeHtml(line)}</div>`;
        }
        html += `</div>`;
        continue;
      }

      if (inHighlight) {
        html += `<div class="highlight">${formatText(line)}</div>`;
        continue;
      }
    }

    reportContent.innerHTML = html;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatText(str) {
    return str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  // ── Navigation ──
  document.getElementById('prevMonth').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  });

  document.getElementById('goToday').addEventListener('click', () => {
    currentMonth = todayDate.getMonth();
    currentYear = todayDate.getFullYear();
    selectedDate = todayStr;
    render();
    if (reportsMap[todayStr]) showReport(todayStr);
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') document.getElementById('prevMonth').click();
    else if (e.key === 'ArrowRight') document.getElementById('nextMonth').click();
  });

  // ── Init ──
  initFromInline();
  loadExternalData();
})();
</script>
